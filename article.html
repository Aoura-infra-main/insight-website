<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting... - Aoura Insights</title>
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');
            if (articleId) {
                window.location.replace(`articles/${articleId}.html`);
            } else {
                window.location.replace('index.html');
            }
        })();
    </script>
    <meta name="robots" content="noindex">
</head>
<body>
    <p>Redirecting to the article... If you are not redirected, please click <a href="index.html">here</a>.</p>
</body>
</html>
