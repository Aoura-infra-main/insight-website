<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insight Reader - Aoura Insights</title>
    <meta name="description" content="Official article reader for Aoura Insights updates and investor bulletins.">
    
    <!-- SEO and Open Graph Meta Tags -->
    <meta property="og:title" content="Insight Reader - Aoura Insights">
    <meta property="og:description" content="Official article reader for Aoura Insights updates and investor bulletins.">
    <meta property="og:type" content="article">
    <meta property="og:url" content="">
    <meta property="og:image" content="assets/logo/logo.jpg">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" type="image/png" href="assets/logo/favicon.png">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <!-- Floating Reading Progress Indicator -->
    <div class="progress-container" aria-hidden="true">
        <div class="progress-bar" id="progress-indicator"></div>
    </div>

    <!-- Floating Sticky Navbar Placeholder -->
    <div id="global-header"></div>

    <!-- Dynamically Populated Article Title Header -->
    <header class="article-header" id="read-header">
        <!-- Rendered dynamically via assets/js/app.js -->
    </header>

    <!-- Multi-column Reading Interface Grid -->
    <main class="article-layout" id="read-layout">
        <!-- Left Sidebar: Sticky Table of Contents -->
        <aside class="article-sidebar-left" aria-label="Table of Contents">
            <h3 class="article-toc-title">Table of Contents</h3>
            <ul class="article-toc-list" id="toc-list">
                <!-- Dynamically populated based on H2 elements in content -->
            </ul>
        </aside>

        <!-- Center Column: Core Content Reader -->
        <article class="article-body-wrapper">
            <div class="article-featured-media" id="read-featured-media">
                <!-- Rendered dynamically via assets/js/app.js -->
            </div>
            <div class="article-body-content" id="read-body-content">
                <!-- Content payload injected dynamically by app.js -->
            </div>
            <div class="article-tags" id="read-tags">
                <!-- Tag blocks injected dynamically by app.js -->
            </div>
        </article>

        <!-- Right Sidebar: Sticky Sharing Controls -->
        <aside class="article-sidebar-right" aria-label="Share Tools">
            <h3 class="share-title">Share Insight</h3>
            <div class="share-buttons">
                <button class="share-btn" id="share-twitter" aria-label="Share on X">
                    <span>X / Twitter</span>
                </button>
                <button class="share-btn" id="share-linkedin" aria-label="Share on LinkedIn">
                    <span>LinkedIn</span>
                </button>
                <button class="share-btn" id="share-copy" aria-label="Copy Link Address">
                    <span>Copy Link</span>
                </button>
            </div>
        </aside>
    </main>

    <!-- Related Articles Grid Section -->
    <section class="section-related" id="related-insights">
        <div class="container">
            <h2 class="text-meta" style="margin-bottom: var(--space-md);">Related Insights</h2>
            <div class="latest-grid related-grid" id="related-grid-list">
                <!-- Populated dynamically via app.js -->
            </div>
        </div>
    </section>

    <!-- Footer Area Placeholder -->
    <div id="global-footer"></div>

    <!-- Interactive Client-side Search Overlay -->
    <div class="search-overlay" aria-hidden="true">
        <div class="search-container">
            <div class="search-header">
                <input type="text" class="search-input" placeholder="Type key terms to search news..." aria-label="Search articles">
                <button class="search-close" aria-label="Close Search">&times;</button>
            </div>
            <div class="search-results">
                <!-- Filled dynamically in app.js -->
            </div>
        </div>
    </div>

    <!-- Mobile Floating TOC Toggle Trigger -->
    <button class="toc-mobile-toggle" id="toc-mobile-btn" aria-label="Toggle Table of Contents">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="6" x2="20" y2="6"></line>
            <line x1="4" y1="12" x2="20" y2="12"></line>
            <line x1="4" y1="18" x2="20" y2="18"></line>
        </svg>
    </button>

    <!-- Slide-up Mobile Table of Contents Drawer -->
    <div class="mobile-toc-drawer" id="mobile-toc-drawer" aria-hidden="true">
        <div class="mobile-toc-drawer-header">
            <h3>Jump to Section</h3>
            <button class="mobile-toc-close" id="mobile-toc-close-btn" aria-label="Close Table of Contents">&times;</button>
        </div>
        <div class="mobile-toc-drawer-body">
            <ul class="mobile-toc-list" id="mobile-toc-list-ul">
                <!-- Dynamically populated via assets/js/app.js -->
            </ul>
        </div>
    </div>
    <div class="mobile-toc-overlay" id="mobile-toc-overlay" aria-hidden="true"></div>

    <!-- Scripts -->
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
