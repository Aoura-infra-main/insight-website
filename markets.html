<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markets & Trade — Aoura Insights</title>
    <meta name="description" content="Macroeconomic trends, GCC regional trade, e-commerce market growth analysis, and procurement market developments.">
    <link rel="icon" type="image/png" href="assets/logo/favicon.png">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <!-- Floating Sticky Navbar Placeholder -->
    <div id="global-header"></div>

    <!-- Channel Hero Section -->
    <header class="hero">
        <div class="container">
            <span class="text-meta hero-meta">REGIONAL DATA</span>
            <h1 class="hero-title">Markets & Trade Analysis</h1>
            <p class="text-lead hero-desc">Monetary trends, GCC shipping updates, UAE economy growth summaries, and consumer retail sector insights.</p>
        </div>
    </header>

    <!-- Dynamic Category Grid -->
    <section class="section-featured" style="padding-top: var(--space-xl);">
        <div class="container">
            <div class="latest-grid category-grid">
                <!-- Dynamically Rendered via assets/js/app.js -->
            </div>
        </div>
    </section>

    <!-- Footer Area Placeholder -->
    <div id="global-footer"></div>

    <!-- Search Overlay -->
    <div class="search-overlay" id="search-modal" aria-hidden="true">
        <div class="search-container">
            <div class="search-header">
                <input type="text" class="search-input" id="search-modal-input" placeholder="Type key terms to search news..." aria-label="Search articles">
                <button class="search-close" id="close-search-btn" aria-label="Close Search">&times;</button>
            </div>
            <div class="search-results" id="search-results-list">
                <!-- Dynamically populated -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
