LINES 1-30: Document Metadata & Styling Imports.

LINES 71-95: Channel Hero showing "Newsroom" details.
LINES 96-120: Dynamic category grid (.newsroom-grid) populated by app.js.
LINES 121-155: Footer Layout with site links and copyright markings.
LINES 156-180: Search System Overlay markup and main JS inclusion.

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsroom - Aoura Insights</title>
    <meta name="description" content="The official archive feed of all announcements, publications, launches, and insights from Aoura Group.">
    <link rel="icon" type="image/png" href="assets/logo/favicon.png">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <!-- Floating Sticky Navbar Placeholder -->
    <div id="global-header"></div>

    <!-- Channel Hero Section -->
    <header class="hero">
        <div class="container">
            <span class="text-meta hero-meta">ARCHIVES</span>
            <h1 class="hero-title">Aoura Newsroom</h1>
            <p class="text-lead hero-desc">A complete chronological log of all press bulletins, acquisitions, financial results, and partner alliances released by Aoura Group corporate relations.</p>
        </div>
    </header>

    <!-- Dynamic Category Grid -->
    <section class="section-featured" style="padding-top: var(--space-xl);">
        <div class="container">
            <div class="latest-grid newsroom-grid">
                <!-- Dynamically Rendered via assets/js/app.js -->
            </div>
        </div>
    </section>

    <!-- Footer Area Placeholder -->
    <div id="global-footer"></div>

    <!-- Interactive Client-side Search Overlay -->
    <div class="search-overlay" aria-hidden="true">
        <div class="search-container">
            <div class="search-header">
                <input type="text" class="search-input" placeholder="Type key terms to search news..." aria-label="Search articles">
                <button class="search-close" aria-label="Close Search">&times;</button>
            </div>
            <div class="search-results">
                <!-- Filled dynamically in app.js -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
